<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Vokabeln</title>
    <style>
        body {
            background-color: #f8f8f8;
            color: 333;
        }

        body {
            font-family: verdana, lucida;
            font-size: 70px;
        }

        div {
            text-align: center;
            padding: 10px;
        }

        button {
            background-color: black;
            color: white;
            border: 5px solid black;
            font-size: 40px;
        }

        button:hover {
            background-color: white;
            color: black;
        }

        #solution {
            margin: 0 auto;
            width: 100%;
        }

        #word2 {
            font-weight: bold;
        }

        #solution button {
            display: inline-block;
            margin: 0 auto;
        }

        #right {
            background-color: lightgreen;
        }

        #wrong {
            background-color: lightcoral;
        }
    </style>
</head>

<body>
    <div id="word1">foo</div>
    <div id="solve"><button>Lösen</button></div>
    <div id="word2">foo</div>
    <div id="solution">
        <button id="right">Richtig</button>
        <button id="wrong">Falsch</button>
    </div>
</body>

<script src="vocabulary.js"></script>
<script>
    window.onload = function () {
        function write_text(id, text) {
            document.getElementById(id).innerHTML = text
        }

        function turn_visibility(id, mode) {
            document.getElementById(id).style.visibility = mode ? "visible" : "hidden"
        }

        function add_click(id, f) {
            document.getElementById(id).addEventListener("click", f)
        }

        function turn_on(id) {
            turn_visibility(id, true)
        }

        function turn_off(id) {
            turn_visibility(id, false)
        }

        function show_solution() {
            turn_on("word2")
            turn_on("solution")
            turn_off("solve")
        }

        function show_word() {
            turn_on("word2")
            turn_on("solution")
            turn_off("solve")
        }

        function next_word() {
            index = (index + 1) % (words.length / 2)
            index = (index + 1) % (words.length / 2)
        }

        function remove_current_word() {
            words.splice(index * 2, 2)
            index = index % (words.length / 2)
        }

        function all_words_solved() {
            return words.length == 0
        }

        function right_solution() {
            remove_current_word()

            if (all_words_solved()) {
                winning_screen()
            } else {
                show_word()
            }
        }

        function wrong_solution() {
            next_word()
            show_word()
        }

        function init() {
            add_click("solve", () => { show_solution() })
            add_click("right", () => { right_solution() })
            add_click("wrong", () => { wrong_solution() })
        }

        function winning_screen() {
            write_text("word1", "Gewonnen :)")
            turn_off("word2")
            turn_off("solve")
            turn_off("solution")
        }

        function show_word() {
            write_text("word1", words[index * 2 + 1])
            write_text("word2", words[index * 2 + 0])
            turn_on("word1")
            turn_on("solve")
            turn_off("word2")
            turn_off("solution")
        }

        function randomize_words() {
            for (let i = 0; i < words.length; i += 2) {
                let j = Math.floor(Math.random() * words.length / 2) * 2
                let tmp = words[i]
                words[i] = words[j]
                words[j] = tmp

                tmp = words[i + 1]
                words[i + 1] = words[j + 1]
                words[j + 1] = tmp
            }
        }

        let words = vocabulary
        let index = 0
        randomize_words()
        init()
        show_word()
    }
</script>

</html>
